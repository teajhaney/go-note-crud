# Air configuration file
# Documentation: https://github.com/cosmtrek/air

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Command to build your Go app
  cmd = "go build -o ./tmp/api.exe ./cmd/api"
  
  # Binary file produced by build
  bin = "tmp/api.exe"
  
  # Full path to binary (optional)
  # full_bin = "tmp/main"
  
  # File extensions to watch
  include_ext = ["go", "tpl", "tmpl", "html"]
  
  # Directories to exclude from watching
  exclude_dir = ["assets", "tmp", "vendor", "node_modules"]
  exclude_regex = ["_test.go"]
  
  # Files to exclude
  exclude_file = []
  
  # Delay before rebuild (ms)
  delay = 300
  
  # Stop running binary on error
  stop_on_error = true

[log]
  time = true

[color]
  main = "cyan"
  watcher = "yellow"
  build = "green"
  runner = "magenta"

[misc]
  clean_on_exit = true
